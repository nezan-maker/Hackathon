services:
  - type: web
    name: flowbot-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5500
      - key: TRUST_PROXY
        value: 1
      - key: MONGO_URI
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: REFRESH_SECRET
        sync: false
      - key: FRONTEND_APP_URL
        value: https://flowbot.onrender.com
      - key: BACKEND_APP_URL
        value: https://flowbot-backend.onrender.com
      - key: CORS_ORIGINS
        value: https://flowbot.onrender.com
      - key: RESEND_API_NAME
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ENABLE_MQTT
        value: "false"
      - key: ALLOW_CARDLESS_PURCHASES
        value: "true"

  - type: web
    name: flowbot
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://flowbot-backend.onrender.com
